name: Daily Valve Wire Digest

on:
  schedule:
    # 6 AM US Central (UTC-6) = 12:00 UTC, weekdays only
    - cron: '0 12 * * 1-5'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  run-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore weekly digest cache
        uses: actions/cache@v4
        with:
          path: data/weekly
          key: weekly-digests-${{ github.run_number }}
          restore-keys: |
            weekly-digests-

      - name: Restore dedup database
        uses: actions/cache@v4
        with:
          path: data/seen_articles.db
          key: dedup-db-${{ github.run_number }}
          restore-keys: |
            dedup-db-

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          NCBI_TOOL: the-valve-wire
          NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: '587'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          CLAUDE_MODEL: claude-sonnet-4-20250514
          WEBSITE_GITHUB_TOKEN: ${{ secrets.WEBSITE_GITHUB_TOKEN }}
          LOG_LEVEL: INFO
        run: python main.py

      - name: Publish digest to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ || true
          git commit -m "Publish daily digest $(date +%Y-%m-%d) [skip ci]" || true
          git push || true
