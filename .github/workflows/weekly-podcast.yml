name: Weekly Valve Wire Podcast

on:
  workflow_run:
    workflows: ["Weekly Valve Wire Summary"]
    types: [completed]
  workflow_dispatch:

jobs:
  generate-podcast:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore podcast segments cache
        uses: actions/cache@v5
        with:
          path: data/podcast/segments
          key: podcast-segments-${{ github.run_number }}
          restore-keys: |
            podcast-segments-

      - name: Generate podcast
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_MODEL: claude-sonnet-4-20250514
          LOG_LEVEL: INFO
        run: |
          # Start 30-min heartbeat in background
          (
            START=$(date +%s)
            while true; do
              sleep 1800
              ELAPSED=$(( ($(date +%s) - START) / 60 ))
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                -d text="🎙️ *Podcast still generating* — ${ELAPSED}min elapsed, still waiting on Anthropic API..." \
                -d parse_mode="Markdown" || true
            done
          ) &
          HEARTBEAT_PID=$!

          # Run podcast
          python main.py --podcast
          EXIT_CODE=$?

          # Kill heartbeat
          kill $HEARTBEAT_PID 2>/dev/null || true

          exit $EXIT_CODE

      # Upload is handled by publisher.py — no duplicate shell upload needed (R5)

      - name: Update RSS feed and landing page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked || true
          git pull --rebase
          git stash pop || true
          git add docs/podcast/ data/podcast_episodes.json site/public/data/podcast_episodes.json site/public/data/latest.json || true
          git commit -m "Publish podcast episode $(date +%Y-%m-%d)" || true
          git push
