name: Weekly Valve Wire Summary

on:
  schedule:
    # Saturday 6 AM US Central (UTC-6) = 12:00 UTC
    - cron: '0 12 * * 6'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  run-weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore weekly digest cache
        uses: actions/cache@v4
        with:
          path: data/weekly
          key: weekly-digests-${{ github.run_number }}
          restore-keys: |
            weekly-digests-

      - name: Run weekly summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: '587'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUB_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
          CLAUDE_MODEL: claude-sonnet-4-20250514
          LOG_LEVEL: INFO
        run: python main.py --weekly
