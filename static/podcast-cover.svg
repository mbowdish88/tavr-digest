<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3000 3000" width="3000" height="3000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a30"/>
      <stop offset="50%" style="stop-color:#0f2440"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a55a"/>
      <stop offset="100%" style="stop-color:#e8c975"/>
    </linearGradient>
    <linearGradient id="gold-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a55a;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#e8c975;stop-opacity:0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="3000" height="3000" fill="url(#bg)"/>

  <!-- Subtle radial glow behind icon -->
  <circle cx="1500" cy="1200" r="600" fill="#1a3a5c" opacity="0.5"/>
  <circle cx="1500" cy="1200" r="400" fill="#1f4468" opacity="0.3"/>

  <!-- Outer gold ring -->
  <circle cx="1500" cy="1200" r="380" fill="none" stroke="url(#gold-ring)" stroke-width="3" opacity="0.6"/>
  <circle cx="1500" cy="1200" r="320" fill="none" stroke="url(#gold-ring)" stroke-width="2" opacity="0.3"/>

  <!-- Heart valve icon (three-leaflet aortic valve) — enlarged -->
  <g transform="translate(1500, 1200)">
    <circle r="240" fill="none" stroke="#c9a55a" stroke-width="4" opacity="0.5"/>
    <circle r="180" fill="none" stroke="#c9a55a" stroke-width="2.5" opacity="0.3"/>
    <!-- Three leaflets -->
    <path d="M0,-160 Q80,-40 0,20 Q-80,-40 0,-160Z" fill="#c9a55a" opacity="0.5"/>
    <path d="M0,-160 Q80,-40 0,20 Q-80,-40 0,-160Z" fill="#c9a55a" opacity="0.4" transform="rotate(120)"/>
    <path d="M0,-160 Q80,-40 0,20 Q-80,-40 0,-160Z" fill="#c9a55a" opacity="0.4" transform="rotate(240)"/>
    <!-- Center dot -->
    <circle r="20" fill="#c9a55a" opacity="0.7"/>
  </g>

  <!-- Waveform / audio motif beneath the valve -->
  <g transform="translate(1500, 1550)" opacity="0.3">
    <rect x="-300" y="-8" width="8" height="16" rx="4" fill="#c9a55a"/>
    <rect x="-260" y="-16" width="8" height="32" rx="4" fill="#c9a55a"/>
    <rect x="-220" y="-24" width="8" height="48" rx="4" fill="#c9a55a"/>
    <rect x="-180" y="-36" width="8" height="72" rx="4" fill="#c9a55a"/>
    <rect x="-140" y="-20" width="8" height="40" rx="4" fill="#c9a55a"/>
    <rect x="-100" y="-40" width="8" height="80" rx="4" fill="#c9a55a"/>
    <rect x="-60" y="-28" width="8" height="56" rx="4" fill="#c9a55a"/>
    <rect x="-20" y="-48" width="8" height="96" rx="4" fill="#c9a55a"/>
    <rect x="20" y="-36" width="8" height="72" rx="4" fill="#c9a55a"/>
    <rect x="60" y="-44" width="8" height="88" rx="4" fill="#c9a55a"/>
    <rect x="100" y="-28" width="8" height="56" rx="4" fill="#c9a55a"/>
    <rect x="140" y="-40" width="8" height="80" rx="4" fill="#c9a55a"/>
    <rect x="180" y="-20" width="8" height="40" rx="4" fill="#c9a55a"/>
    <rect x="220" y="-32" width="8" height="64" rx="4" fill="#c9a55a"/>
    <rect x="260" y="-16" width="8" height="32" rx="4" fill="#c9a55a"/>
    <rect x="300" y="-8" width="8" height="16" rx="4" fill="#c9a55a"/>
  </g>

  <!-- Title -->
  <text x="1500" y="1820" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="200" font-weight="700" fill="#ffffff" letter-spacing="4">
    The Valve Wire
  </text>

  <!-- WEEKLY subtitle -->
  <text x="1500" y="1940" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="100" fill="#c9a55a" letter-spacing="20" font-weight="400">
    WEEKLY
  </text>

  <!-- Tagline -->
  <text x="1500" y="2100" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="56" fill="#8fa8c8" letter-spacing="3">
    A Podcast on Transcatheter Valve Technology
  </text>

  <!-- Gold accent line -->
  <rect x="600" y="2180" width="1800" height="3" rx="1.5" fill="url(#gold)" opacity="0.5"/>

  <!-- Hosted by -->
  <text x="1500" y="2300" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="52" fill="#8fa8c8" letter-spacing="2">
    Hosted by E. Nolan Beckett
  </text>

  <!-- Bottom gold accent line -->
  <rect x="0" y="2940" width="3000" height="4" fill="url(#gold)" opacity="0.4"/>
  <rect x="0" y="2950" width="3000" height="2" fill="url(#gold)" opacity="0.2"/>
</svg>
